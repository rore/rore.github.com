<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>
    {% if page.title %}{{ page.title }} &ndash; {% endif %}{% if site.site_name %}{{ site.site_name }}{% else %}{{ site.name }}{% endif %}
  </title>
  <meta property="twitter:account_id" content="1510103595" />
  <meta name="author" content="{{ site.name }}" />
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="alternate" type="application/rss+xml" href="/atom.xml" />
  <link rel="stylesheet" href="/css/fontawesome.min.css" type="text/css" media="screen, projection" />
  <link rel="stylesheet" href="/css/base.css" type="text/css" media="screen, projection" />
  <link rel="stylesheet" href="/css/pygments.css" type="text/css" />
  <link media="only screen and (max-device-width: 480px)" href="/css/mobile.css" type="text/css" rel="stylesheet" />
  <link media="only screen and (device-width: 768px)" href="/css/mobile.css" type="text/css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Yanone+Kaffeesatz&display=swap" rel="stylesheet" type="text/css" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>

<body>
  <section class="sidebar">
    <a href="/">
      <img src="{{ site.gravatar_url }}?s=150" height="75" width="75" class="avatar" />
    </a>
    <section class="name">
      <a href="/">
        <span id="fname">{{ site.name | split:' ' | first }}</span>
        <span id="lname">{{ site.name | split:' ' | last }}</span>
      </a>
    </section>
    <section class="meta">
      <a href="https://github.com/rore" target="_blank" rel="noopener noreferrer"><i class="icon icon-github"></i></a>
      <a href="{{ site.linkedin }}" target="_blank" rel="noopener noreferrer"><i class="icon icon-linkedin"></i></a>
      <a href="https://twitter.com/{{ site.twitter }}" target="_blank" rel="noopener noreferrer"><i class="icon icon-twitter"></i></a>
      <a href="/atom.xml"><i class="icon icon-rss"></i></a>
    </section>
    <section class="sections">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/posts.html">Posts</a></li>
        <li><a href="/speaking.html">Speaking</a></li>
      </ul>
    </section>
  </section>
  {{ content }}
  <section class="footer">
    Powered by <a href="https://jekyllrb.com/" target="_blank" rel="noopener noreferrer">Jekyll</a>.&nbsp;&nbsp;&nbsp;&nbsp;Based on the <a href="https://github.com/holman/left" target="_blank" rel="noopener noreferrer">Left</a> theme.
  </section>
</body>
</html>
